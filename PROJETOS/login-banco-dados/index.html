<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login | Protótipo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 300px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #333;
        }
        p {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
        }
        input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background-color: #0056b3;
        }
        .note {
            font-size: 0.8rem;
            color: #888;
            margin-top: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Acesse sua Conta</h1>
        <form onsubmit="alert('Esta é uma demonstração visual do portfólio. A conexão real com o Banco de Dados exige um servidor PHP.'); return false;">
            <p>
                <label>E-mail</label>
                <input type="text" name="email" placeholder="exemplo@email.com">
            </p>
            <p>
                <label>Senha</label>
                <input type="password" name="senha" placeholder="Sua senha">
            </p>
            <p>
                <button type="submit">Entrar</button>
            </p>
        </form>
        <div class="note">Modo de Visualização (Sem PHP)</div>
    </div>
</body>
</html>
