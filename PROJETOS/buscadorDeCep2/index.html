<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de CEP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body class="container" style="background-color: #DEDEDE;">
    <section class="row mt-5 align-items-center">
        <div class="col">
            <img src="./img/imagem.svg" alt="Imagem" width="100%">
        </div>
        <div class="col">
            <article class="card card-body">
                <h3>Consulte seu Endereço</h3>
                <hr>
                <form action="">
                    <label for="cep">CEP</label>
                    <input id="cep" type="text" class="form-control mb-3" placeholder="EX.: 12345678">
                    
                    <label for="logradouro">Rua</label>
                    <input id="logradouro" type="text" class="form-control mb-3" placeholder="EX.: Rua X, Travessa Y, Av Z">

                    <label for="numero">Número</label>
                    <input id="numero" type="text" class="form-control mb-3" placeholder="EX.: 123">
                    
                    <label for="bairro">Bairro</label>
                    <input id="bairro" type="text" class="form-control mb-3" placeholder="EX.: Centro">

                    <label for="cidade">Cidade</label>
                    <input id="cidade" type="text" class="form-control mb-3" placeholder="EX.: Itabuna">

                    <label for="uf">Estado</label>
                    <input id="uf" type="text" class="form-control mb-3" placeholder="EX.: BA">
                </form>
            </article>
        </div>
    </section>
    <script src="main.js"> </script>
</body>
</html>
